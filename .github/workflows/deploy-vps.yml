name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------------------------------------------------------
      # Step 1: Sync GitHub Secrets → .env.production on the VPS
      # To add/change a secret: GitHub → Settings → Secrets → Actions.
      # Push to main (or trigger workflow manually) — no SSH required.
      # -------------------------------------------------------------------
      - name: Sync environment to VPS
        uses: appleboy/ssh-action@master
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_URL: ${{ secrets.AUTH_URL }}
          AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
          AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEXT_PUBLIC_ADSENSE_PUB_ID: ${{ secrets.NEXT_PUBLIC_ADSENSE_PUB_ID }}
          NEXT_PUBLIC_ADSENSE_SLOT_ID: ${{ secrets.NEXT_PUBLIC_ADSENSE_SLOT_ID }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PRICE_ID: ${{ secrets.STRIPE_PRICE_ID }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          envs: DATABASE_URL,DIRECT_URL,AUTH_SECRET,AUTH_URL,AUTH_GOOGLE_ID,AUTH_GOOGLE_SECRET,R2_ACCOUNT_ID,R2_ACCESS_KEY_ID,R2_SECRET_ACCESS_KEY,R2_BUCKET_NAME,R2_PUBLIC_URL,GROQ_API_KEY,NEXT_PUBLIC_ADSENSE_PUB_ID,NEXT_PUBLIC_ADSENSE_SLOT_ID,STRIPE_SECRET_KEY,STRIPE_PRICE_ID,STRIPE_WEBHOOK_SECRET,OPENROUTER_API_KEY,RESEND_API_KEY,EMAIL_FROM
          script: |
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            [ -z "$APP_DIR" ] && APP_DIR="/opt/chapturs"
            ENV_FILE="$APP_DIR/.env.production"
            TMP_FILE="$APP_DIR/.env.production.new"

            # Keys managed by GitHub Secrets (will be updated/added on every deploy)
            MANAGED_KEYS="DATABASE_URL|DIRECT_URL|AUTH_SECRET|AUTH_URL|AUTH_GOOGLE_ID|AUTH_GOOGLE_SECRET|R2_ACCOUNT_ID|R2_ACCESS_KEY_ID|R2_SECRET_ACCESS_KEY|R2_BUCKET_NAME|R2_PUBLIC_URL|GROQ_API_KEY|NEXT_PUBLIC_ADSENSE_PUB_ID|NEXT_PUBLIC_ADSENSE_SLOT_ID|STRIPE_SECRET_KEY|STRIPE_PRICE_ID|STRIPE_WEBHOOK_SECRET|OPENROUTER_API_KEY|RESEND_API_KEY|EMAIL_FROM|NODE_ENV"

            # Start from existing file, stripping any managed keys (they'll be re-added below)
            if [ -f "$ENV_FILE" ]; then
              grep -vE "^($MANAGED_KEYS)=" "$ENV_FILE" > "$TMP_FILE" || true
            else
              > "$TMP_FILE"
            fi

            # Append each managed secret only if GitHub provided a value
            write_if_set() { [ -n "$2" ] && printf '%s=%s\n' "$1" "$2" >> "$TMP_FILE"; }

            write_if_set "DATABASE_URL"                  "$DATABASE_URL"
            write_if_set "DIRECT_URL"                    "$DIRECT_URL"
            write_if_set "AUTH_SECRET"                   "$AUTH_SECRET"
            write_if_set "AUTH_URL"                      "$AUTH_URL"
            write_if_set "AUTH_GOOGLE_ID"                "$AUTH_GOOGLE_ID"
            write_if_set "AUTH_GOOGLE_SECRET"            "$AUTH_GOOGLE_SECRET"
            write_if_set "R2_ACCOUNT_ID"                 "$R2_ACCOUNT_ID"
            write_if_set "R2_ACCESS_KEY_ID"              "$R2_ACCESS_KEY_ID"
            write_if_set "R2_SECRET_ACCESS_KEY"          "$R2_SECRET_ACCESS_KEY"
            write_if_set "R2_BUCKET_NAME"                "$R2_BUCKET_NAME"
            write_if_set "R2_PUBLIC_URL"                 "$R2_PUBLIC_URL"
            write_if_set "GROQ_API_KEY"                  "$GROQ_API_KEY"
            write_if_set "NEXT_PUBLIC_ADSENSE_PUB_ID"    "$NEXT_PUBLIC_ADSENSE_PUB_ID"
            write_if_set "NEXT_PUBLIC_ADSENSE_SLOT_ID"   "$NEXT_PUBLIC_ADSENSE_SLOT_ID"
            write_if_set "STRIPE_SECRET_KEY"             "$STRIPE_SECRET_KEY"
            write_if_set "STRIPE_PRICE_ID"               "$STRIPE_PRICE_ID"
            write_if_set "STRIPE_WEBHOOK_SECRET"         "$STRIPE_WEBHOOK_SECRET"
            write_if_set "OPENROUTER_API_KEY"            "$OPENROUTER_API_KEY"
            write_if_set "RESEND_API_KEY"                "$RESEND_API_KEY"
            write_if_set "EMAIL_FROM"                    "$EMAIL_FROM"
            printf 'NODE_ENV=production\n'              >> "$TMP_FILE"

            mv "$TMP_FILE" "$ENV_FILE"
            chmod 600 "$ENV_FILE"
            echo "✓ .env.production synced ($(wc -l < "$ENV_FILE") lines)"

      # -------------------------------------------------------------------
      # Step 2: Pull code, build, prisma db push, restart PM2
      # -------------------------------------------------------------------
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 45m
          timeout: 60m
          
          # Run deployment script on VPS
          script: |
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then
              APP_DIR="/opt/chapturs"
            fi

            if [ ! -d "$APP_DIR" ]; then
              echo "App directory not found: $APP_DIR"
              exit 1
            fi

            cd "$APP_DIR"
            echo "Deploying from: $(pwd)"

            # One-time safety: ensure local deploy script drift cannot block pull.
            if [ -d ".git" ]; then
              git config core.fileMode false || true
              if ! git diff --quiet -- .github/scripts/deploy.sh; then
                echo "Local changes detected in .github/scripts/deploy.sh, restoring before pull"
                git restore -- .github/scripts/deploy.sh || true
              fi
              git pull origin main
            fi

            if [ -f ".github/scripts/deploy.sh" ]; then
              bash .github/scripts/deploy.sh
            else
              echo "deploy.sh not found, running inline deploy fallback"
              git pull origin main
              npm install
              npm run build
              npx prisma db push --skip-generate || true
              pm2 reload "${{ secrets.PM2_APP_NAME }}" || pm2 start npm --name "${{ secrets.PM2_APP_NAME }}" -- start
              pm2 save || true
            fi

      - name: Deployment Status
        if: success()
        run: |
          echo "✓ Deployment successful!"
          echo "Application is now running on VPS at ${{ secrets.VPS_HOST }}"

      - name: Deployment Failed
        if: failure()
        run: |
          echo "✗ Deployment failed!"
          echo "Please check the VPS logs for details"
