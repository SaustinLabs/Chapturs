# /etc/nginx/sites-available/chapturs
#
# Nginx reverse proxy for Chapturs (Next.js standalone, PM2 on port 3000).
#
# What this does:
#   /_next/static/  → served directly from disk (content-hashed, cache forever)
#   /favicon.ico, /robots.txt, /og-image.jpg, etc.
#                   → served directly from public/ on disk (try_files)
#   Everything else → proxied to Node.js on 127.0.0.1:3000
#
# First-time VPS setup (run once as root / sudo):
#   sudo ln -sf /etc/nginx/sites-available/chapturs /etc/nginx/sites-enabled/chapturs
#   sudo nginx -t && sudo systemctl reload nginx
#
# On subsequent deploys the GitHub Actions workflow handles nginx -t + reload.
# --------------------------------------------------------------------------

# Trust Cloudflare edge IPs so $remote_addr reflects the real visitor IP
# (required for rate-limiting, logging, and X-Real-IP forwarding).
# Keep this outside any server block so it applies globally.
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
# IPv6 Cloudflare ranges
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

server {
    listen 80;
    server_name chapturs.com www.chapturs.com;

    # Document root for try_files (public/ static assets: favicon, og-image, etc.)
    # In standalone mode Next.js also copies public/ into .next/standalone/public/,
    # but we use the top-level /opt/chapturs/public/ that is rsynced on every deploy.
    root /opt/chapturs/public;

    # -----------------------------------------------------------------------
    # /_next/static/ — JS bundles, CSS, fonts.
    # Filenames are content-hashed by Next.js so they can be cached forever.
    # Nginx serves these straight from disk; Node.js is never involved.
    # -----------------------------------------------------------------------
    location /_next/static/ {
        alias /opt/chapturs/.next/standalone/.next/static/;
        add_header Cache-Control "public, max-age=31536000, immutable";
        # No need to log every asset hit — keeps logs useful.
        access_log off;
    }

    # -----------------------------------------------------------------------
    # /_next/image/ — Next.js image optimisation endpoint.
    # Must always go through Node.js; never serve from disk.
    # -----------------------------------------------------------------------
    location /_next/image/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # -----------------------------------------------------------------------
    # Everything else:
    # 1. Try to serve the file directly from public/ (favicon, robots.txt, etc.)
    # 2. If not found on disk, proxy to the Next.js server on port 3000.
    # -----------------------------------------------------------------------
    location / {
        try_files $uri $uri/ @nextjs;
    }

    location @nextjs {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket support (used by HMR in dev; harmless in prod)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Forward Cloudflare's proto header so Next.js knows the request was HTTPS
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        proxy_cache_bypass $http_upgrade;

        # AI quality-assessment + LLM calls can take up to ~60 s.
        # Keep read timeout generous so they don't get cut off mid-stream.
        proxy_read_timeout    120s;
        proxy_connect_timeout   5s;
        proxy_send_timeout     60s;

        # Disable proxy buffering for streamed responses (SSE, if added later)
        proxy_buffering off;
    }

    # Deny access to hidden files (e.g. .env, .git)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
